name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint (Static Analysis)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run static analysis
        run: |
          xcodebuild \
            -project grain.xcodeproj \
            -scheme grain \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            analyze

  build-and-test:
    name: Build and Test
    runs-on: macos-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build app
        run: |
          xcodebuild \
            -project grain.xcodeproj \
            -scheme grain \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Run unit tests
        run: |
          xcodebuild \
            -project grain.xcodeproj \
            -scheme grain \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            CODE_SIGNING_ALLOWED=NO \
            test \
            -only-testing:grainTests

      - name: Run UI tests
        run: |
          xcodebuild \
            -project grain.xcodeproj \
            -scheme grain \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            CODE_SIGNING_ALLOWED=NO \
            test \
            -only-testing:grainUITests
