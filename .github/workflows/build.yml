name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Build
        run: |
          set -o pipefail
          if command -v xcpretty > /dev/null 2>&1; then
            xcodebuild build \
              -project grain.xcodeproj \
              -scheme grain \
              -destination 'platform=iOS Simulator,OS=latest' \
              CODE_SIGNING_ALLOWED=NO \
              | xcpretty
          else
            xcodebuild build \
              -project grain.xcodeproj \
              -scheme grain \
              -destination 'platform=iOS Simulator,OS=latest' \
              CODE_SIGNING_ALLOWED=NO
          fi

      - name: Test
        run: |
          set -o pipefail
          if command -v xcpretty > /dev/null 2>&1; then
            xcodebuild test \
              -project grain.xcodeproj \
              -scheme grain \
              -destination 'platform=iOS Simulator,OS=latest' \
              CODE_SIGNING_ALLOWED=NO \
              | xcpretty
          else
            xcodebuild test \
              -project grain.xcodeproj \
              -scheme grain \
              -destination 'platform=iOS Simulator,OS=latest' \
              CODE_SIGNING_ALLOWED=NO
          fi
