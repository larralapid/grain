name: Bug Report
description: Report a bug or unexpected behavior
labels: ["type: bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Open the app
        2. Navigate to …
        3. Tap on …
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device / Simulator
      description: e.g. iPhone 15 Pro, iOS 17.4 Simulator
  - type: input
    id: ios-version
    attributes:
      label: iOS Version
      description: e.g. 17.4
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "low"
        - "medium"
        - "high"
    validations:
      required: true
